<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глазами Героя</title>
    <meta name="description" content="Интерактивный исторический проект «Глазами Героя».">
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@700;800&family=Rubik:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --text: #ffffff;
            --muted: rgba(255, 255, 255, .72);
            --accent: #ff2530;
            --panel: rgba(8, 13, 22, .72);
            --line: rgba(255, 255, 255, .14);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
        }

        body {
            min-height: 100dvh;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            background:
                linear-gradient(90deg, rgba(7, 11, 18, .96) 0%, rgba(7, 11, 18, .72) 45%, rgba(7, 11, 18, .42) 100%),
                radial-gradient(circle at 72% 18%, rgba(255, 37, 48, .22), transparent 26%),
                url('../photos/episode_aldar_bg.jpg') center / cover no-repeat,
                #08111d;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, .08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, .08) 1px, transparent 1px);
            background-size: 80px 80px;
            opacity: .08;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            position: relative;
            z-index: 1;
            width: min(1180px, calc(100% - 48px));
            min-height: 100dvh;
            margin: 0 auto;
            padding: 28px 0;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            letter-spacing: -.02em;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            flex: 0 0 auto;
            background: center / contain no-repeat url('../assets/logo-header.png');
        }

        .brand-name {
            font-family: 'Rubik', 'Manrope', sans-serif;
            font-size: 19px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            min-height: 46px;
            padding: 12px 18px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .94);
            color: #14161b;
            font-size: 14px;
            font-weight: 800;
            box-shadow: 0 16px 34px rgba(0, 0, 0, .18);
            transition: transform .18s ease, background .18s ease;
        }

        .back-link:hover {
            transform: translateY(-1px);
            background: #ffffff;
        }

        .game-shell {
            flex: 1;
            display: grid;
            place-items: center;
            padding: 10px 0 34px;
        }

        .game-card {
            width: 100%;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 32px;
            background: var(--panel);
            backdrop-filter: blur(18px);
            box-shadow: 0 30px 90px rgba(0, 0, 0, .34);
        }

        .game-heading {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 18px;
            padding: 2px 4px 16px;
        }

        .game-title {
            margin: 0;
            max-width: 760px;
            font-family: 'Manrope', sans-serif;
            font-size: clamp(28px, 4vw, 46px);
            line-height: .96;
            letter-spacing: -.055em;
            font-weight: 800;
        }

        .game-subtitle {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.35;
            font-weight: 600;
        }

        .status-pill {
            flex: 0 0 auto;
            padding: 10px 13px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .08);
            color: rgba(255, 255, 255, .82);
            font-size: 13px;
            font-weight: 800;
            letter-spacing: .06em;
            text-transform: uppercase;
        }


        .game-controls {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .fullscreen-button {
            min-height: 40px;
            padding: 10px 14px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 255, 255, .12);
            color: rgba(255, 255, 255, .92);
            font: inherit;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: transform .18s ease, background .18s ease;
        }

        .fullscreen-button:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, .18);
        }

        #unity-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10;
            border-radius: 24px;
            overflow: hidden;
            background:
                radial-gradient(circle at 80% 20%, rgba(255, 37, 48, .12), transparent 22%),
                linear-gradient(145deg, rgba(14, 25, 38, .98) 0%, rgba(5, 8, 13, .98) 100%);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .08);
        }

        #unity-canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #05080d;
        }

        #unity-loading-bar {
            position: absolute;
            inset: 0;
            display: none;
            place-items: center;
            padding: 24px;
            background:
                linear-gradient(135deg, rgba(6, 10, 17, .94), rgba(11, 18, 30, .9));
            z-index: 3;
        }

        .loader-box {
            width: min(360px, 100%);
            text-align: center;
        }

        .loader-logo {
            width: 76px;
            height: 76px;
            margin: 0 auto 18px;
            background: center / contain no-repeat url('../assets/logo-header.png');
        }

        .loader-text {
            margin: 0 0 14px;
            color: rgba(255, 255, 255, .84);
            font-weight: 800;
        }

        #unity-progress-bar-empty {
            width: 100%;
            height: 10px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(255, 255, 255, .14);
        }

        #unity-progress-bar-full {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: var(--accent);
            transition: width .2s ease;
        }

        #unity-warning {
            position: absolute;
            left: 16px;
            right: 16px;
            top: 16px;
            z-index: 4;
            display: none;
            overflow: hidden;
            border-radius: 16px;
            color: #11151b;
            font-weight: 700;
        }

        #unity-warning div {
            padding: 12px 14px;
        }

        @media (max-width: 760px) {
            .page {
                width: calc(100% - 24px);
                padding: 16px 0;
            }

            .topbar,
            .game-heading {
                align-items: flex-start;
                flex-direction: column;
            }

            .back-link,
            .fullscreen-button {
                width: 100%;
            }

            .game-controls {
                width: 100%;
                justify-content: stretch;
            }

            .status-pill {
                width: 100%;
                text-align: center;
            }

            .game-card {
                padding: 12px;
                border-radius: 24px;
            }

            #unity-container {
                border-radius: 18px;
            }
        }

        @media (max-height: 760px) and (min-width: 761px) {
            .page {
                padding: 18px 0;
                gap: 14px;
            }

            .game-heading {
                padding-bottom: 12px;
            }

            .game-title {
                font-size: 32px;
            }

            .game-subtitle {
                margin-top: 6px;
            }
        }


        /* Поддержка телефонов и маленьких экранов */
        .mobile-help {
            display: none;
            margin: 0 0 12px;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, .14);
            border-radius: 18px;
            background: rgba(255, 255, 255, .10);
            color: rgba(255, 255, 255, .88);
            font-size: 14px;
            line-height: 1.35;
            font-weight: 700;
        }

        @media (max-width: 860px) {
            .mobile-help {
                display: block;
            }

            .page {
                width: calc(100% - 20px);
                padding: 12px 0;
                gap: 14px;
            }

            .brand-name {
                max-width: calc(100vw - 92px);
                overflow: hidden;
                white-space: nowrap;
                text-overflow: ellipsis;
                font-size: 16px;
            }

            .brand-mark {
                width: 36px;
                height: 36px;
            }

            .back-link,
            .fullscreen-button {
                min-height: 44px;
                padding: 11px 14px;
            }

            .game-shell {
                padding: 0 0 18px;
            }

            .game-card {
                padding: 12px;
                border-radius: 22px;
            }

            .game-heading {
                padding: 0 0 12px;
            }

            #unity-container {
                aspect-ratio: 16 / 10;
                border-radius: 16px;
            }

            #unity-warning {
                left: 10px;
                right: 10px;
                top: 10px;
                font-size: 13px;
            }
        }

        @media (max-width: 860px) and (orientation: landscape) {
            body {
                overflow: hidden;
            }

            .page {
                width: calc(100% - 16px);
                min-height: 100dvh;
                padding: 8px 0;
                gap: 8px;
            }

            .topbar {
                flex-direction: row;
                align-items: center;
            }

            .back-link {
                width: auto;
                min-height: 38px;
                padding: 9px 13px;
                font-size: 13px;
            }

            .brand-name {
                font-size: 15px;
            }

            .game-shell {
                padding: 0;
            }

            .game-card {
                height: calc(100dvh - 68px);
                padding: 8px;
                border-radius: 18px;
                display: flex;
                flex-direction: column;
            }

            .game-heading {
                flex: 0 0 auto;
                padding: 0 0 8px;
            }

            .mobile-help {
                display: none;
            }

            .game-heading {
                flex-direction: row;
                align-items: center;
                justify-content: flex-end;
            }

            .game-controls {
                width: auto;
                justify-content: flex-end;
            }

            .fullscreen-button {
                width: auto;
                min-height: 36px;
                padding: 8px 12px;
                font-size: 12px;
            }

            #unity-container {
                flex: 1;
                height: auto;
                aspect-ratio: auto;
                min-height: 0;
            }
        }

        @media (max-width: 480px) {
            .page {
                width: calc(100% - 16px);
            }

            .topbar {
                gap: 12px;
            }

            .game-card {
                padding: 10px;
                border-radius: 20px;
            }

            .mobile-help {
                font-size: 13px;
                border-radius: 16px;
            }
        }

        @media (hover: none) and (pointer: coarse) {
            .back-link:hover,
            .fullscreen-button:hover {
                transform: none;
            }

            .back-link,
            .fullscreen-button {
                -webkit-tap-highlight-color: transparent;
            }
        }

    </style>
</head>

<body>
    <div class="page">
        <header class="topbar">
            <a class="brand" href="../" aria-label="Глазами Героя">
                <span class="brand-mark" aria-hidden="true"></span>
                <span class="brand-name">Глазами Героя</span>
            </a>
            <a class="back-link" href="../">← Вернуться на сайт</a>
        </header>

        <main class="game-shell">
            <section class="game-card" aria-label="Подвиг Алдара Цыденжапова">
                <div class="game-heading">
                    <div class="game-controls">
                        <button class="fullscreen-button" id="unity-fullscreen-button" type="button">⛶ На весь
                            экран</button>
                    </div>
                </div>


                <p class="mobile-help">На телефоне лучше повернуть экран горизонтально и нажать «На весь экран». Если управление в эпизоде окажется неудобным, проходить лучше с компьютера.</p>

                <div id="unity-container">
                    <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>
                    <div id="unity-loading-bar">
                        <div class="loader-box">
                            <div class="loader-logo" aria-hidden="true"></div>
                            <p class="loader-text">Загрузка</p>
                            <div id="unity-progress-bar-empty">
                                <div id="unity-progress-bar-full"></div>
                            </div>
                        </div>
                    </div>
                    <div id="unity-warning"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const canvas = document.querySelector('#unity-canvas');
        const container = document.querySelector('#unity-container');
        const loadingBar = document.querySelector('#unity-loading-bar');
        const progressBarFull = document.querySelector('#unity-progress-bar-full');
        const warningBanner = document.querySelector('#unity-warning');
        const fullscreenButton = document.querySelector('#unity-fullscreen-button');
        let unityInstance = null;

        const isMobileDevice = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMobileDevice) {
            document.body.classList.add('is-mobile-device');
        }

        function refocusCanvas() {
            if (canvas && document.activeElement !== canvas) {
                canvas.focus({ preventScroll: true });
            }
        }

        window.addEventListener('resize', () => {
            requestAnimationFrame(refocusCanvas);
        });
        window.addEventListener('orientationchange', () => {
            setTimeout(refocusCanvas, 250);
        });
        container.addEventListener('touchstart', refocusCanvas, { passive: true });

        function unityShowBanner(msg, type) {
            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
            }

            const div = document.createElement('div');
            div.innerHTML = msg;
            warningBanner.appendChild(div);

            if (type === 'error') {
                div.style.background = '#ff4d55';
                div.style.color = '#fff';
            } else {
                div.style.background = type === 'warning' ? '#ffd166' : '#ffffff';
                setTimeout(() => {
                    warningBanner.removeChild(div);
                    updateBannerVisibility();
                }, 5000);
            }

            updateBannerVisibility();
        }

        const buildUrl = 'Build';
        const loaderUrl = buildUrl + '/webgl.loader.js';
        const config = {
            arguments: [],
            dataUrl: buildUrl + '/webgl.data',
            frameworkUrl: buildUrl + '/webgl.framework.js',
            codeUrl: buildUrl + '/webgl.wasm',
            streamingAssetsUrl: 'StreamingAssets',
            companyName: 'DefaultCompany',
            productName: 'GlazamiGeroya',
            productVersion: '0.1.0',
            showBanner: unityShowBanner
        };

        if (isMobileDevice) {
            config.devicePixelRatio = Math.min(window.devicePixelRatio || 1, 2);
        }

        loadingBar.style.display = 'grid';

        const script = document.createElement('script');
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = `${100 * progress}%`;
            }).then((instance) => {
                unityInstance = instance;
                loadingBar.style.display = 'none';
                refocusCanvas();
                fullscreenButton.disabled = false;
            }).catch((message) => {
                alert(message);
            });
        };

        fullscreenButton.disabled = true;
        fullscreenButton.addEventListener('click', () => {
            if (unityInstance) {
                unityInstance.SetFullscreen(1);
            } else if (container.requestFullscreen) {
                container.requestFullscreen();
            }
        });

        document.body.appendChild(script);
    </script>
</body>

</html>
